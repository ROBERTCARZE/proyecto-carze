<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto | CARZE</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --sw:220px;--bg:#f0f2f5;--white:#fff;--naranja:#f97316;--naranja2:#ea580c;
  --azul:#1a3a6b;--azul2:#1e40af;--border:#e4e8ef;--txt:#1e293b;--muted:#64748b;--light:#f8fafc;
  --verde:#16a34a;--rojo:#dc2626;--amarillo:#f59e0b;--morado:#9333ea;
  --font:'Century Gothic','CenturyGothic',Verdana,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--txt);overflow:hidden}

/* MAIN */
.main{margin-left:var(--sw);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left h1{font-family:var(--font);font-size:1.3rem;font-weight:800;color:var(--naranja)}
.topbar-left p{font-size:.7rem;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--light);border:1px solid var(--border);border-radius:50px;padding:6px 14px 6px 8px}
.user-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--naranja),var(--naranja2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff}
.user-name{font-size:.75rem;font-weight:700;color:var(--txt)}
.btn-logout{display:flex;align-items:center;gap:7px;padding:7px 15px;border:1.5px solid #fecaca;border-radius:9px;background:transparent;color:#dc2626;font-family:inherit;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-logout:hover{background:#dc2626;color:#fff;border-color:#dc2626}
.fecha-badge{font-size:.72rem;font-weight:700;color:var(--muted);background:var(--light);border:1px solid var(--border);border-radius:8px;padding:6px 12px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 26px;display:flex;align-items:center;justify-content:center}

/* EN CONSTRUCCIÓN */
.construccion{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;animation:fadeUp .4s ease both}
.construccion-icon{font-size:2.8rem;margin-bottom:14px}
.construccion-title{font-family:var(--font);font-size:1.15rem;font-weight:800;color:var(--azul);margin-bottom:8px}
.construccion-txt{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:4px}
.construccion-badge{display:inline-block;margin-top:16px;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--naranja);background:rgba(249,115,22,.1);border-radius:20px;padding:6px 16px}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Presupuesto</h1>
      <p>Planificación de costos · CARZE Contratistas Generales S.A.C.</p>
    </div>
    <div class="topbar-right">
      <div class="fecha-badge" id="fechaHoy">—</div>
      <div class="user-badge">
        <div class="user-avatar" id="avatarInitials">?</div>
        <span class="user-name" id="userName">Usuario</span>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </button>
    </div>
  </div>

  <div class="content">
    <div class="construccion">
      <div class="construccion-icon">📈</div>
      <div class="construccion-title">Módulo en construcción</div>
      <p class="construccion-txt">Estamos trabajando en la herramienta de Presupuesto y Planificación de Costos.</p>
      <p class="construccion-txt">Pronto podrás gestionarlo desde aquí.</p>
      <span class="construccion-badge">Próximamente</span>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

const firebaseConfig={
    apiKey:"AIzaSyAk1FGQia36Y2G08L-_mscMv5JnozmPYa0",
    authDomain:"gestioncarze.firebaseapp.com",
    projectId:"gestioncarze",
    storageBucket:"gestioncarze.firebasestorage.app",
    messagingSenderId:"487407475826",
    appId:"1:487407475826:web:32185a60f0123a5d25f6eb"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

// Este módulo todavía no lee ni escribe datos de Firestore — solo valida
// la sesión, igual que el resto de páginas del ERP, para que nadie entre
// sin loguearse. Cuando se desarrolle el módulo real, aquí se agregan
// los imports/listeners de Firestore que hagan falta.

// ── SESIÓN ────────────────────────────────────────────────────
onAuthStateChanged(auth, function(user){
    if(!user){
        window.location.replace('index.html');
        return;
    }
    if(!sessionStorage.getItem('carze_nombre') && user.email){
        var nombres = {
            'proyectos@carzesac.com': 'Jans Carrillo',
            'logistica@carzesac.com': 'Edwduar Carrillo',
            'informes@carzesac.com':  'Jhonny Carrillo',
            'robertcz@carzesac.com':  'Robert Carrillo Zeña',
        };
        sessionStorage.setItem('carze_logged','true');
        sessionStorage.setItem('carze_nombre', nombres[user.email]||user.email.split('@')[0]);
        sessionStorage.setItem('carze_uid',    user.uid);
        sessionStorage.setItem('carze_email',  user.email);
    }
});

window.addEventListener('DOMContentLoaded',function(){
    var n=sessionStorage.getItem('carze_nombre')||'Usuario';
    document.getElementById('userName').textContent=n;
    document.getElementById('avatarInitials').textContent=
        n.split(' ').map(function(p){return p[0]||'';}).slice(0,2).join('').toUpperCase()||'U';
    var hoyD=new Date();
    function p2(v){return v<10?'0'+v:String(v);}
    document.getElementById('fechaHoy').textContent=
        p2(hoyD.getDate())+' '+['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][hoyD.getMonth()]+' '+hoyD.getFullYear();
});

function cerrarSesion(){
    signOut(auth).then(function(){
        sessionStorage.clear();
        window.location.replace('index.html');
    }).catch(function(){
        sessionStorage.clear();
        window.location.replace('index.html');
    });
}
window.cerrarSesion=cerrarSesion;
</script>
<script src="sidebar.js"></script>
<script src="carzecito.js" defer></script>
</body>
</html>
