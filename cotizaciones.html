<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Cotizaciones | CARZE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:#070d1f;color:rgba(255,255,255,0.85);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
        .back{position:fixed;top:24px;left:28px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(99,140,255,0.2);border-radius:10px;padding:9px 16px;color:rgba(255,255,255,0.5);font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all 0.2s}
        .back:hover{color:white;border-color:rgba(99,140,255,0.4)}
        .badge{background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.25);color:#f97316;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;padding:5px 14px;border-radius:20px;text-transform:uppercase}
        h1{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;text-align:center}
        h1 span{color:#f97316}
        p{font-size:0.85rem;color:rgba(255,255,255,0.35);text-align:center;max-width:320px;line-height:1.6}
        .dot{width:8px;height:8px;border-radius:50%;background:#f97316;animation:pulse 1.4s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
    </style>
</head>
<body>
    <a href="PORTADA.html" class="back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>

    <div class="dot"></div>
    <span class="badge">En construcción</span>
    <h1>Módulo <span>Cotizaciones</span></h1>

        if(sessionStorage.getItem('carze_logged')!=='true') window.location.replace('index.html');
