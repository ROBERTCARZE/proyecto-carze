<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturas | CARZE</title>
    <script src="carze_session.js"></script>
    <style>
        @keyframes flotar{0%{transform:translateY(0)}50%{transform:translateY(-15px)}100%{transform:translateY(0)}}
        body{margin:0;display:flex;font-family:'Segoe UI',sans-serif;background:#f8fafc;}
        .mascota-flotante{position:fixed;bottom:20px;left:300px;width:120px;animation:flotar 3s ease-in-out infinite;z-index:999;pointer-events:none;}
        .menu-link{display:flex;align-items:center;color:#64748b;text-decoration:none;padding:13px 28px;font-size:0.83rem;font-weight:700;transition:all 0.3s ease;border-left:5px solid transparent;}
        .menu-link img{width:22px;height:22px;margin-right:13px;object-fit:contain;}
        .menu-link:hover{background:#fff7ed;color:#f97316;border-left:5px solid #f97316;padding-left:38px;}
        .menu-link.activo{background:#eff6ff;color:#1a3a6b;border-left:5px solid #1a3a6b;}
    </style>
</head>
<body>

<img src="img/mascota_carze.png" class="mascota-flotante" alt="Mascota CARZE">

<!-- SIDEBAR -->
<div style="width:280px;height:100vh;background:#fff;position:fixed;left:0;top:0;padding:28px 0;box-shadow:5px 0 25px rgba(0,0,0,0.08);border-right:1px solid #f0f0f0;display:flex;flex-direction:column;z-index:1000;overflow-y:auto;">
    <div style="padding:0 28px 32px 28px;text-align:center;">
        <img src="img/logo_carze_2.png" style="width:100%;max-width:175px;height:auto;">
    </div>
    <nav style="flex-grow:1;">
        <a class="menu-link" href="1. DASHBORD.html"><img src="img/Cotizaciones.png">DASHBOARD</a>
        <a class="menu-link" href="3. COTIZACIONES.html"><img src="img/Cotizaciones.png">COTIZACIONES</a>
        <a class="menu-link" href="4. CERTIFICADOS.html"><img src="img/Certificados.png">CERTIFICADOS</a>
        <a class="menu-link" href="5. FACTURAS.html"><img src="img/Factura.png">FACTURAS</a>
        <a class="menu-link" href="6. IMPUESTOS.html"><img src="img/Impuestos.png">IMPUESTOS</a>
        <a class="menu-link" href="7. PERSONAL.html"><img src="img/Personal.png">PERSONAL</a>
        <a class="menu-link" href="8. FINANZAS.html"><img src="img/Finanzas.png">FINANZAS</a>
        <a class="menu-link" href="9. PRONTO_PAGO.html"><img src="img/Pronto Pago.png">PRONTO PAGO</a>
        <a class="menu-link" href="10. CAJA_DIARIA.html"><img src="img/Caja Diaria.png">CAJA DIARIA</a>
        <a class="menu-link" href="11. FLUJO_DE_CAJA.html"><img src="img/Flujo de Caja.png">FLUJO DE CAJA</a>
        <a class="menu-link" href="12. VENCIMIENTO_ALERTAS.html"><img src="img/Vencimiento y Alerta.png">VENCIMIENTO Y ALERTAS</a>
        <a class="menu-link" href="13. SEGUIMIENTO.html"><img src="img/Seguimiento.png">SEGUIMIENTO</a>
    </nav>
</div>

<!-- MAIN -->
<main style="margin-left:280px;padding:0;width:calc(100% - 280px);">
    <div id="topbar-placeholder"></div>
    <div style="padding:30px;">
        <div style="background:white;padding:25px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="color:#f97316;margin-bottom:20px;">Gestión de Facturas</h2>
            <p style="color:#64748b;font-size:0.9rem;">Esta sección está en desarrollo. Próximamente disponible.</p>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function(){
        carze_renderTopbar(true);
        // Marcar enlace activo
        var links = document.querySelectorAll('.menu-link');
        links.forEach(function(l){
            if (l.href === window.location.href) l.classList.add('activo');
        });
    });
</script>
</body>
</html>
